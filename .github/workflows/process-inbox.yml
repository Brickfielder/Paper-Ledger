name: Process paper inbox

on:
  workflow_dispatch:
    inputs:
      sources:
        description: "Paste DOI(s) or URL(s), one per line or separated by spaces."
        required: false
        type: string
      force_reprocess:
        description: "Replace existing matching papers instead of skipping duplicates."
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - "inbox/**"
      - "scripts/process-inbox.mjs"

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-bin-links

      - name: Stage workflow input sources
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sources != '' }}
        env:
          WORKFLOW_SOURCES: ${{ github.event.inputs.sources }}
        run: |
          node --input-type=module <<'EOF'
          import fs from "node:fs/promises";

          const raw = process.env.WORKFLOW_SOURCES || "";
          const pattern = /https?:\/\/[^\s]+|10\.\d{4,9}\/[-._;()/:A-Z0-9]+/gi;
          const sources = [...raw.matchAll(pattern)]
            .map((match) => match[0].trim())
            .map((value) => value.replace(/[)>.,;]+$/, ""))
            .filter(Boolean);

          for (const [index, source] of sources.entries()) {
            const fileName = `workflow-dispatch-${String(index + 1).padStart(2, "0")}.txt`;
            await fs.writeFile(`inbox/${fileName}`, `${source}\n`, "utf8");
          }

          console.log(`Queued ${sources.length} source(s) from workflow inputs.`);
          EOF

      - name: Process inbox
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.4-mini
          OPENAI_MODEL_FALLBACKS: gpt-4o-mini
          AUTO_PUBLISH: "true"
          FORCE_REPROCESS: ${{ github.event.inputs.force_reprocess == 'true' && 'true' || 'false' }}
        run: npm run process:inbox

      - name: Commit generated posts
        run: |
          git add -A src/content/papers inbox
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Process paper inbox"
          git push
